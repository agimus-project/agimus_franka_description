name: ROS2 Continuous Integration
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    strategy:
      matrix:
        env:
          - {ROS_DISTRO: humble}
          # - {ROS_DISTRO: jazzy} TODO
          # - {ROS_DISTRO: kilted} TODO
          # - {ROS_DISTRO: rolling} TODO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: 'ros-industrial/industrial_ci@c3c2176f065be940a8c3738362f550639cb8d2d3'
        env: ${{ matrix.env }}
  check:
    if: always()
    name: check-ros-ci
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

name: "CI - Nix"

on:
  push:
    branches:
    - humble-devel
  pull_request:
    branches:
    - humble-devel

jobs:
  nix:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: gepetto
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: ros
      - run: nix build -L
